name: Auto-Update Mastodon Extended

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 02:00
  workflow_dispatch:      # Allows manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: komplix/mastodon-extended

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Remote Docker Image Digest
        id: remote
        run: |
          # Pull official image to get its unique digest
          docker pull tootsuite/mastodon:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' tootsuite/mastodon:latest)
          echo "official_digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Get Local Docker Image Digest
        id: local
        continue-on-error: true
        run: |
          # Pull my  custom image to get its unique digest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest)
          echo "custom_digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Build and push image
        # Build if digests don't match OR if triggered manually
        if: steps.remote.outputs.official_digest != steps.local.outputs.custom_digest || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
