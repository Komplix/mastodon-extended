name: Auto-Update Mastodon Extended

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 02:00
  workflow_dispatch:      # Allows manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: komplix/mastodon-extended

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Latest Official Release Tag
        id: mastodon
        run: |
          # Fetch the latest release tag name from Mastodon's GitHub API
          VERSION=$(curl -s https://api.github.com/repos/mastodon/mastodon/releases/latest | jq -r .tag_name)
          
          # Check if VERSION is valid (not null or empty)
          if [ "$VERSION" == "null" ] || [ -z "$VERSION" ]; then
            echo "Error: Could not fetch latest release tag"
            exit 1
          fi
          
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          
          # Pull official image to get its unique digest for comparison
          docker pull tootsuite/mastodon:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' tootsuite/mastodon:latest)
          echo "official_digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Get Local Docker Image Digest
        id: local
        continue-on-error: true
        run: |
          # Pull my custom image to compare it with the official one
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest)
          echo "custom_digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Build and push image
        # Build if digests don't match OR if triggered manually
        if: steps.mastodon.outputs.official_digest != steps.local.outputs.custom_digest || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with 'latest' AND the specific version number
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.mastodon.outputs.tag }}
